<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIXMOS Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!--
  ═══════════════════════════════════════════════════════════
  AIXMOS PRIVATE PORTAL
  Deploy on UGREEN NAS via Docker (nginx container)

  DEPLOYMENT STEPS:
  1. Open UGREEN NAS → Container Manager
  2. Pull image: nginx:alpine
  3. Create container:
     - Port mapping: 8080 → 80
     - Volume: /your-nas-folder/portal → /usr/share/nginx/html
  4. Upload this file as index.html to /your-nas-folder/portal/
  5. Enable UGREEN remote access or DDNS
  6. Point your domain to your NAS IP:8080

  FOLDER STRUCTURE ON NAS:
  /portal/          ← this file (index.html)
  /training/        ← operator training videos + PDFs
  /operator-sops/   ← SOPs, scripts, templates
  /member-resources/ ← client pathway resources
  /admin-only/      ← Muhammad-only files

  USER ACCOUNTS (update the USERS object below):
  Add or remove users by editing the USERS constant.
  Each user has a role: admin | executive | operator | member

  SECURITY NOTE:
  This uses client-side auth — suitable for internal use on a
  private NAS. For production public-facing use, add a
  server-side auth layer (Node.js + JWT or similar).
  ═══════════════════════════════════════════════════════════
  -->

  <style>
    :root {
      --blue:     #1440C4;
      --blue-2:   #2563EB;
      --blue-dim: rgba(20,64,196,0.07);
      --navy:     #0A1628;
      --white:    #FFFFFF;
      --surface:  #F4F7FF;
      --border:   rgba(10,37,102,0.1);
      --muted:    rgba(10,22,40,0.5);
      --green:    #1D9E75;
      --amber:    #D97706;
      --red:      #C0392B;
      --font-d:   'Bebas Neue', sans-serif;
      --font-b:   'DM Sans', sans-serif;
      --sidebar:  240px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--font-b); font-size: 14px; line-height: 1.5; color: var(--navy); background: var(--surface); -webkit-font-smoothing: antialiased; }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: flex; }

    /* ══════════════════════════════════
       LOGIN
    ══════════════════════════════════ */
    #v-login {
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      position: relative;
      overflow: hidden;
    }
    #v-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 70% 50%, rgba(20,64,196,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 20% 80%, rgba(37,99,235,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .login-box {
      background: var(--white);
      border-radius: 16px;
      padding: 40px;
      width: 380px;
      position: relative;
      z-index: 1;
    }
    .login-logo {
      font-family: var(--font-d);
      font-size: 32px;
      color: var(--navy);
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .login-logo span { color: var(--blue); }
    .login-sub { font-size: 12px; color: var(--muted); margin-bottom: 32px; letter-spacing: 0.06em; text-transform: uppercase; }
    .login-label { display: block; font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.04em; }
    .login-input { width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font-b); color: var(--navy); background: var(--white); margin-bottom: 14px; }
    .login-input:focus { outline: none; border-color: var(--blue); }
    .login-btn { width: 100%; padding: 12px; background: var(--blue); color: var(--white); border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: var(--font-b); transition: background 0.15s; }
    .login-btn:hover { background: var(--blue-2); }
    .login-error { color: var(--red); font-size: 12px; margin-top: 10px; display: none; }

    /* ══════════════════════════════════
       PORTAL SHELL
    ══════════════════════════════════ */
    #v-portal {
      flex-direction: row;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar);
      background: var(--navy);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
    }
    .sidebar-logo {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo-text {
      font-family: var(--font-d);
      font-size: 26px;
      color: var(--white);
      letter-spacing: 0.06em;
    }
    .sidebar-logo-text span { color: #93C5FD; }
    .sidebar-role-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .sidebar-user {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-user-name { font-size: 13px; font-weight: 500; color: var(--white); }
    .sidebar-user-email { font-size: 11px; color: rgba(255,255,255,0.4); }
    .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .nav-section { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 12px 20px 6px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      transition: all 0.15s;
      border-left: 2px solid transparent;
    }
    .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.05); }
    .nav-item.active { color: var(--white); background: rgba(20,64,196,0.25); border-left-color: #93C5FD; }
    .nav-item-icon { font-size: 16px; flex-shrink: 0; }
    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .logout-btn {
      width: 100%;
      padding: 9px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      font-family: var(--font-b);
      transition: all 0.15s;
    }
    .logout-btn:hover { background: rgba(255,255,255,0.12); color: var(--white); }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    .topbar-title { font-family: var(--font-d); font-size: 22px; letter-spacing: 0.04em; color: var(--navy); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-greeting { font-size: 12px; color: var(--muted); }
    .content { padding: 28px; flex: 1; }

    /* ── DASHBOARD PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── STAT CARDS ── */
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
    .stat-num { font-family: var(--font-d); font-size: 36px; color: var(--blue); line-height: 1; margin-bottom: 4px; }
    .stat-label { font-size: 12px; color: var(--muted); }

    /* ── GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }

    /* ── CARDS ── */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; }
    .card-title { font-size: 13px; font-weight: 500; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .card-title-icon { color: var(--blue); }

    /* ── TABLE ── */
    .table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table th { text-align: left; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--navy); }
    .table tr:last-child td { border-bottom: none; }
    .table tr:hover td { background: var(--surface); }

    /* ── BADGES ── */
    .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; letter-spacing: 0.04em; }
    .badge-blue { background: var(--blue-dim); color: var(--blue); }
    .badge-green { background: rgba(29,158,117,0.1); color: var(--green); }
    .badge-amber { background: rgba(217,119,6,0.1); color: var(--amber); }
    .badge-red { background: rgba(192,57,43,0.1); color: var(--red); }

    /* ── FILE VAULT ── */
    .file-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .file-card { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .file-card:hover { border-color: var(--blue); transform: translateY(-1px); }
    .file-icon { font-size: 28px; margin-bottom: 8px; }
    .file-name { font-size: 12px; font-weight: 500; color: var(--navy); margin-bottom: 3px; }
    .file-size { font-size: 11px; color: var(--muted); }

    /* ── PATHWAY PROGRESS ── */
    .pathway-step { display: flex; gap: 14px; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .pathway-step:last-child { border-bottom: none; }
    .pathway-num { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--blue); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: var(--blue); flex-shrink: 0; }
    .pathway-num.done { background: var(--blue); color: var(--white); border-color: var(--blue); }
    .pathway-title { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .pathway-desc { font-size: 12px; color: var(--muted); }
    .progress-bar { background: var(--border); border-radius: 4px; height: 6px; margin: 8px 0; }
    .progress-fill { background: var(--blue); border-radius: 4px; height: 6px; transition: width 0.3s; }

    /* ── BUTTONS ── */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font-b); border: none; transition: all 0.15s; }
    .btn-blue { background: var(--blue); color: var(--white); }
    .btn-blue:hover { background: var(--blue-2); }
    .btn-outline { background: transparent; color: var(--navy); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-header h2 { font-family: var(--font-d); font-size: 26px; letter-spacing: 0.02em; }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .sidebar { width: 200px; transform: translateX(-100%); transition: transform 0.2s; }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; }
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .grid-2, .grid-3, .file-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════
     LOGIN VIEW
══════════════════════════════════ -->
<div id="v-login" class="view active">
  <div class="login-box">
    <div class="login-logo">AIX<span>MOS</span></div>
    <div class="login-sub">Private Portal · Secure Access</div>
    <div>
      <label class="login-label" for="l-email">Email address</label>
      <input class="login-input" type="email" id="l-email" placeholder="your@email.com" autocomplete="username" />
      <label class="login-label" for="l-pass">Password</label>
      <input class="login-input" type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()" />
      <button class="login-btn" onclick="login()">Sign in →</button>
      <div class="login-error" id="l-err">Invalid email or password. Try again.</div>
    </div>
    <p style="font-size:11px;color:var(--muted);margin-top:20px;text-align:center">AIXMOS · Confidential · Authorized access only</p>
  </div>
</div>

<!-- ══════════════════════════════════
     PORTAL VIEW
══════════════════════════════════ -->
<div id="v-portal" class="view">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">AIX<span>MOS</span></div>
      <div class="sidebar-role-badge" id="s-role-badge">Portal</div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-name" id="s-user-name">—</div>
      <div class="sidebar-user-email" id="s-user-email">—</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- populated by JS based on role -->
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-right">
        <div class="topbar-greeting" id="topbar-greeting"></div>
      </div>
    </div>
    <div class="content" id="main-content">
      <!-- panels rendered here by JS -->
    </div>
  </div>

</div>

<script>
  /* ══════════════════════════════════
     USER ACCOUNTS
     Primary: /data/users.json (Airtable → npm run sync:aixmos-people)
     Fallback: USERS_FALLBACK (local dev before first sync)
     Roles: admin | executive | operator | member
  ══════════════════════════════════ */
  const USERS_FALLBACK = [
    { email: 'muhammad@aixmos.com',  password: 'AIXMOSadmin2025!',  name: 'Muhammad Taha',    role: 'admin' },
    { email: 'exec1@aixmos.com',     password: 'Exec2025secure',     name: 'Executive 1',      role: 'executive' },
    { email: 'exec2@aixmos.com',     password: 'Exec2025secure2',    name: 'Executive 2',      role: 'executive' },
    { email: 'exec3@aixmos.com',     password: 'Exec2025secure3',    name: 'Executive 3',      role: 'executive' },
    { email: 'operator@aixmos.com',  password: 'Operator2025!',      name: 'AIXMOS Operator',  role: 'operator' },
    { email: 'member@aixmos.com',    password: 'Member2025!',        name: 'AIXMOS Member',    role: 'member' },
  ];
  let USERS = [];
  let usersReady = false;

  /* ══════════════════════════════════
     NAV CONFIG PER ROLE
  ══════════════════════════════════ */
  const NAV = {
    admin: [
      { section: 'Overview', items: [
        { id: 'dashboard',   icon: 'ti-layout-dashboard', label: 'Dashboard' },
        { id: 'revenue',     icon: 'ti-chart-bar',        label: 'Revenue' },
        { id: 'pipeline',    icon: 'ti-filter',           label: 'Pipeline' },
      ]},
      { section: 'Team', items: [
        { id: 'executives',  icon: 'ti-users',            label: 'Executives' },
        { id: 'operators',   icon: 'ti-user-check',       label: 'Operators' },
      ]},
      { section: 'Resources', items: [
        { id: 'vault',       icon: 'ti-folder',           label: 'Training Vault' },
        { id: 'sops',        icon: 'ti-file-text',        label: 'SOPs & Docs' },
        { id: 'tools',       icon: 'ti-tools',            label: 'Tools' },
      ]},
      { section: 'System', items: [
        { id: 'settings',    icon: 'ti-settings',         label: 'Settings' },
      ]},
    ],
    executive: [
      { section: 'Overview', items: [
        { id: 'dashboard',   icon: 'ti-layout-dashboard', label: 'Dashboard' },
        { id: 'pipeline',    icon: 'ti-filter',           label: 'Pipeline' },
      ]},
      { section: 'Team', items: [
        { id: 'operators',   icon: 'ti-user-check',       label: 'Operators' },
      ]},
      { section: 'Resources', items: [
        { id: 'vault',       icon: 'ti-folder',           label: 'Training Vault' },
        { id: 'sops',        icon: 'ti-file-text',        label: 'SOPs & Docs' },
      ]},
    ],
    operator: [
      { section: 'My Work', items: [
        { id: 'dashboard',   icon: 'ti-layout-dashboard', label: 'My Dashboard' },
        { id: 'my-clients',  icon: 'ti-users',            label: 'My Clients' },
        { id: 'earnings',    icon: 'ti-cash',             label: 'Earnings' },
      ]},
      { section: 'Resources', items: [
        { id: 'vault',       icon: 'ti-folder',           label: 'Training Vault' },
        { id: 'sops',        icon: 'ti-file-text',        label: 'Scripts & SOPs' },
        { id: 'tools',       icon: 'ti-tools',            label: 'CHUMMO Tools' },
      ]},
    ],
    member: [
      { section: 'My Journey', items: [
        { id: 'dashboard',   icon: 'ti-layout-dashboard', label: 'My Dashboard' },
        { id: 'pathway',     icon: 'ti-route',            label: 'My Pathway' },
        { id: 'resources',   icon: 'ti-book',             label: 'Resources' },
      ]},
      { section: 'Support', items: [
        { id: 'operator',    icon: 'ti-headset',          label: 'My Operator' },
        { id: 'upgrade',     icon: 'ti-arrow-up-circle',  label: 'Upgrade' },
      ]},
    ],
  };

  /* ══════════════════════════════════
     STATE
  ══════════════════════════════════ */
  let currentUser = null;
  let currentPanel = 'dashboard';

  /* ══════════════════════════════════
     LOAD USERS (Airtable sync → data/users.json)
  ══════════════════════════════════ */
  async function loadUsers() {
    const btn = document.querySelector('#v-login .login-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Loading…'; }
    try {
      const res = await fetch('/data/users.json', { cache: 'no-store' });
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data.users) && data.users.length > 0) {
          USERS = data.users;
          usersReady = true;
          return;
        }
      }
    } catch (e) {
      console.warn('[portal] users.json unavailable, using fallback', e);
    }
    USERS = USERS_FALLBACK;
    usersReady = true;
  }

  /* ══════════════════════════════════
     AUTH
  ══════════════════════════════════ */
  function login() {
    if (!usersReady) {
      document.getElementById('l-err').textContent = 'Accounts still loading. Try again.';
      document.getElementById('l-err').style.display = 'block';
      return;
    }
    const email = document.getElementById('l-email').value.trim().toLowerCase();
    const pass  = document.getElementById('l-pass').value;
    const user  = USERS.find(u => u.email.toLowerCase() === email && u.password === pass);
    if (!user) {
      document.getElementById('l-err').style.display = 'block';
      return;
    }
    document.getElementById('l-err').style.display = 'none';
    currentUser = user;
    sessionStorage.setItem('aixmos_user', JSON.stringify(user));
    showPortal();
  }

  function logout() {
    currentUser = null;
    sessionStorage.removeItem('aixmos_user');
    document.getElementById('v-portal').classList.remove('active');
    document.getElementById('v-login').classList.add('active');
    document.getElementById('l-pass').value = '';
  }

  /* ══════════════════════════════════
     PORTAL INIT
  ══════════════════════════════════ */
  function showPortal() {
    document.getElementById('v-login').classList.remove('active');
    document.getElementById('v-portal').classList.add('active');

    const u = currentUser;
    document.getElementById('s-user-name').textContent   = u.name;
    document.getElementById('s-user-email').textContent  = u.email;
    document.getElementById('s-role-badge').textContent  = u.role.toUpperCase();
    document.getElementById('topbar-greeting').textContent = greet() + ', ' + u.name.split(' ')[0];

    buildNav(u.role);
    showPanel('dashboard');
  }

  function greet() {
    const h = new Date().getHours();
    if (h < 12) return 'Good morning';
    if (h < 17) return 'Good afternoon';
    return 'Good evening';
  }

  /* ══════════════════════════════════
     NAV BUILDER
  ══════════════════════════════════ */
  function buildNav(role) {
    const nav = document.getElementById('sidebar-nav');
    nav.innerHTML = '';
    (NAV[role] || []).forEach(group => {
      const sec = document.createElement('div');
      sec.className = 'nav-section';
      sec.textContent = group.section;
      nav.appendChild(sec);
      group.items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'nav-item';
        el.dataset.id = item.id;
        el.innerHTML = `<i class="ti ${item.icon} nav-item-icon" aria-hidden="true"></i><span>${item.label}</span>`;
        el.onclick = () => showPanel(item.id);
        nav.appendChild(el);
      });
    });
  }

  function setActiveNav(id) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const el = document.querySelector(`.nav-item[data-id="${id}"]`);
    if (el) el.classList.add('active');
  }

  /* ══════════════════════════════════
     PANEL ROUTER
  ══════════════════════════════════ */
  function showPanel(id) {
    currentPanel = id;
    setActiveNav(id);
    const titles = {
      dashboard: 'Dashboard', revenue: 'Revenue', pipeline: 'Pipeline',
      executives: 'Executives', operators: 'Operators', 'my-clients': 'My Clients',

      <div style="font-size:40px;margin-bottom:16px">🔧</div>
      <div style="font-family:var(--font-d);font-size:28px;margin-bottom:8px">${title}</div>
      <div style="font-size:14px;color:var(--muted)">This section is being built. Check back soon.</div>
    </div>
  `; }

  /* ══════════════════════════════════
     INIT — load users, then restore session
  ══════════════════════════════════ */
  (async function initPortal() {
    await loadUsers();
    const btn = document.querySelector('#v-login .login-btn');
    if (btn) { btn.disabled = false; btn.textContent = 'Sign in →'; }
    const saved = sessionStorage.getItem('aixmos_user');
    if (saved) {
      try {
        currentUser = JSON.parse(saved);
        const ok = USERS.some(u => u.email === currentUser.email && u.role === currentUser.role);
        if (ok) showPortal();
        else sessionStorage.removeItem('aixmos_user');
      } catch {
        sessionStorage.removeItem('aixmos_user');
      }
    }
  })();
</script>
</body>
</html>
