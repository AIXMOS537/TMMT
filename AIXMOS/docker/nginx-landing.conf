server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /files/ {
        alias /usr/share/nginx/html/files/;
        add_header Content-Disposition "inline";
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
