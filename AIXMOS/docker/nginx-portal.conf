# nginx-portal.conf
# ═══════════════════════════════════════════════════════
# AIXMOS Private Portal — nginx config
# Repo: AIXMOS/docker/nginx-portal.conf
# NAS:  /share/AIXMOS/docker/nginx-portal.conf (mounted by docker-compose)
# ═══════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── PORTAL APP ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # ── TRAINING FILES (PDFs, HTML, Docs) ──
    location /files/ {
        alias /usr/share/nginx/html/files/;
        add_header Content-Disposition "inline";
        add_header Cache-Control "no-cache";
    }

    # ── TRAINING VIDEOS (MP4 from NAS) ──
    location /training/ {
        alias /usr/share/nginx/html/training/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── OPERATOR SOPs ──
    location /sops/ {
        alias /usr/share/nginx/html/sops/;
        add_header Content-Disposition "inline";
    }

    # ── MEMBER RESOURCES ──
    location /resources/ {
        alias /usr/share/nginx/html/resources/;
        add_header Content-Disposition "inline";
    }

    # ── COMPRESSION ──
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1000;

    # ── SECURITY HEADERS ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── CACHE STATIC ASSETS ──
    location ~* \.(css|js|woff2|png|jpg|svg)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── LOGGING ──
    access_log /var/log/nginx/portal_access.log;
    error_log  /var/log/nginx/portal_error.log;
}
